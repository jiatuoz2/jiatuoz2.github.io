# Maps a bib entry's `abbr` to a colored badge (and optional link) on /publications/.
# Key must match the `abbr` field exactly.

"Under review":
  color: "#b08968" # muted brown — signals not-yet-published, no link

"Cond. Accept":
  color: "#2a9d8f" # teal — conditionally accepted, not yet published, no link

"UIST":
  url: https://uist.acm.org/
  color: "#0076df"

"ISMAR":
  url: https://www.ieee-ismar.org/
  color: "#e63946"

"IEEE VR":
  url: https://ieeevr.org/
  color: "#1d3557"
